<!DOCTYPE html>
<html>
<head>
    <title>Simple Web App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 30px;
        }
        .button {
            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            display: block;
            width: 200px;
            margin: 20px auto;
        }
        .button:hover {
            background: #45a049;
        }
        #output {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Simple Web App</h1>
        <p>Esta es una aplicación web simple que funciona en cualquier navegador.</p>
        
        <button class="button" onclick="showMessage()">Mostrar Mensaje</button>
        <button class="button" onclick="showTime()">Mostrar Hora</button>
        <button class="button" onclick="clearOutput()">Limpiar</button>
        
        <div id="output">
            <p>Haz clic en los botones para ver resultados aquí...</p>
        </div>
    </div>

    <script>
        function showMessage() {
            const output = document.getElementById('output');
            output.innerHTML = '<p>✅ ¡Funciona perfectamente! Esta aplicación web está funcionando correctamente.</p>';
        }
        
        function showTime() {
            const output = document.getElementById('output');
            const now = new Date();
            output.innerHTML = `<p>🕐 Hora actual: ${now.toLocaleString()}</p>`;
        }
        
        function clearOutput() {
            const output = document.getElementById('output');
            output.innerHTML = '<p>Salida limpiada. Haz clic en los botones para ver resultados...</p>';
        }
        
        // Mostrar mensaje de bienvenida
        window.onload = function() {
            console.log('Aplicación web cargada correctamente');
        };
    </script>
</body>
</html>

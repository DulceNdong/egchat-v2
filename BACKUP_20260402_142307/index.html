<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EGCHAT - Guinea Ecuatorial</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- CRITICAL: Global error suppression for browser extensions -->
    <script>
      // 1. Suppress window errors globally
      window.onerror = function(msg, url, lineNo, colNo, error) {
        if (msg && (msg.includes('getRangeAt') || msg.includes('isSelection') || msg.includes('Illegal invocation'))) {
          return true;
        }
        return false;
      };

      // 2. Suppress unhandled promise rejection errors
      window.onunhandledrejection = function(event) {
        if (event.reason && event.reason.toString && event.reason.toString().includes('getRangeAt')) {
          event.preventDefault();
          return false;
        }
      };

      // 3. Intercept console methods BEFORE extensions load
      const originalError = console.error;
      const originalWarn = console.warn;
      const originalLog = console.log;

      console.error = function(...args) {
        const msg = args[0] && args[0].toString ? args[0].toString() : '';
        if (!msg.includes('getRangeAt') && !msg.includes('isSelection') && !msg.includes('Illegal invocation')) {
          originalError.apply(console, args);
        }
      };

      console.warn = function(...args) {
        const msg = args[0] && args[0].toString ? args[0].toString() : '';
        if (!msg.includes('getRangeAt') && !msg.includes('isSelection')) {
          originalWarn.apply(console, args);
        }
      };

      // 4. Patch Selection API robustly
      if (Selection && Selection.prototype) {
        const originalGetRangeAt = Selection.prototype.getRangeAt;
        if (originalGetRangeAt) {
          Selection.prototype.getRangeAt = function(index) {
            try {
              // Validate range count first
              if (!this.rangeCount || index < 0 || index >= this.rangeCount) {
                // Return empty range instead of throwing
                return document.createRange();
              }
              return originalGetRangeAt.call(this, index);
            } catch (e) {
              // Silently return empty range on any error
              return document.createRange();
            }
          };
        }
      }

      // 5. Patch window.getSelection to be extra safe
      const originalGetSelection = window.getSelection;
      window.getSelection = function() {
        try {
          const selection = originalGetSelection.call(window);
          if (!selection) return selection;
          
          // Wrap getRangeAt method
          if (selection.getRangeAt) {
            const origMethod = selection.getRangeAt.bind(selection);
            selection.getRangeAt = function(index) {
              try {
                if (selection.rangeCount && index >= 0 && index < selection.rangeCount) {
                  return origMethod(index);
                }
                return document.createRange();
              } catch (e) {
                return document.createRange();
              }
            };
          }
          return selection;
        } catch (e) {
          // Return null if getSelection itself fails
          return null;
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>

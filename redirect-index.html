<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/egchat-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EGCHAT v2.0.0</title>
    <script>
      // Redirigir automáticamente a localhost:3002
      window.location.replace('http://localhost:3002');
    </script>
  </head>
  <body>
    <div style="
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.85) 0%, rgba(59, 130, 246, 0.85) 50%, rgba(139, 92, 246, 0.85) 100%);
      color: white;
    ">
      <div style="
        text-align: center;
        padding: 40px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(40px);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        max-width: 400px;
      ">
        <div style="
          width: 80px;
          height: 80px;
          background: rgba(255, 255, 255, 0.2);
          border-radius: 20px;
          display: flex;
          align-items: center;
          justify-content: center;
          margin: 0 auto 24px;
          animation: spin 2s linear infinite;
        ">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            <path d="M17 8v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5"/>
            <circle cx="9" cy="13" r="2"/>
            <circle cx="15" cy="13" r="2"/>
          </svg>
        </div>
        <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 16px;">EGCHAT v2.0.0</h1>
        <p style="font-size: 16px; opacity: 0.9; margin-bottom: 16px;">Redirigiendo al servidor local...</p>
        <p style="font-size: 14px; opacity: 0.7;">Si no redirige automáticamente, haz clic <a href="http://localhost:3002" style="color: #10b981; text-decoration: underline;">aquí</a></p>
      </div>
    </div>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>

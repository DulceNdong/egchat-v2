        }

            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 200, 160, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);

            background: rgba(255, 255, 255, 0.2);

            font-size: 12px;
            opacity: 0.6;

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGCHAT - Redirección</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.85) 0%, rgba(59, 130, 246, 0.85) 50%, rgba(139, 92, 246, 0.85) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 24px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }
        .status {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                <path d="M17 8v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5"/>
                <circle cx="9" cy="13" r="2"/>
                <circle cx="15" cy="13" r="2"/>
            </svg>
        </div>
        <h1>EGCHAT v2.0.0</h1>
        <p>Redirigiendo al servidor local...</p>
        <div class="status" id="status">Conectando con localhost:3002</div>
    </div>

    <script>
        // Intentar redirigir a localhost
        function redirectToLocalhost() {
            const status = document.getElementById('status');
            
            // Lista de posibles IPs locales
            const localUrls = [
                'http://localhost:3002',
                'http://127.0.0.1:3002',
                'http://192.168.1.100:3002', // IP local común
                'http://192.168.0.100:3002',  // Otra IP local común
                'http://10.0.0.100:3002'      // Red local
            ];
            
            let currentIndex = 0;
            
            function tryNextUrl() {
                if (currentIndex >= localUrls.length) {
                    status.textContent = 'No se encontró el servidor local. Asegúrate de que EGCHAT esté corriendo en localhost:3002';
                    return;
                }
                
                const url = localUrls[currentIndex];
                status.textContent = `Intentando conectar con ${url}...`;
                
                // Crear un iframe para probar la conexión
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = url;
                
                iframe.onload = function() {
                    // Si carga correctamente, redirigir
                    window.location.href = url;
                };
                
                iframe.onerror = function() {
                    // Si falla, intentar con la siguiente URL
                    currentIndex++;
                    setTimeout(tryNextUrl, 1000);
                };
                
                // Timeout para manejar casos donde no hay respuesta
                setTimeout(() => {
                    if (iframe.parentNode) {
                        iframe.parentNode.removeChild(iframe);
                        currentIndex++;
                        setTimeout(tryNextUrl, 1000);
                    }
                }, 3000);
                
                document.body.appendChild(iframe);
            }
            
            // Iniciar el proceso
            setTimeout(tryNextUrl, 1000);
        }
        
        // Iniciar cuando la página cargue
        window.addEventListener('load', redirectToLocalhost);
        
        // También permitir clic manual para redirigir
        document.addEventListener('click', function() {
            window.location.href = 'http://localhost:3002';
        });
    </script>
</body>
</html>
